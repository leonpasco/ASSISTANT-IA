services:
  - type: web
    name: tradingview-telegram-bot
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: BOT_TOKEN
        sync: false  # Tu rempliras ça manuellement sur Render
      - key: CHAT_ID
        sync: false  # Tu rempliras ça manuellement sur Render
